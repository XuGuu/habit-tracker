# 每次 push / PR 时，在 GitHub 的机器上跑核心逻辑的单元测试。
# 通过的话，仓库主页会显示绿色的 ✅ 徽章。
name: 测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: 跑单元测试
        run: node --test test_habit_logic.js
