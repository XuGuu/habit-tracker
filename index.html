<!DOCTYPE html>
<!--
  习惯追踪器 (Habit Tracker)
  添加习惯 → 每天打卡 → 看到"连续天数"和一张绿色热力图（像 GitHub 主页那种小方块）。
  数据全部存在浏览器本地（localStorage），不上传、不联网。双击本文件即可使用。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="习惯打卡追踪器：热力图、连续天数、本周本月完成率。纯前端，数据存本地，不联网。">
  <meta name="color-scheme" content="dark">
  <title>习惯追踪器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 32px 18px 60px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 26px; margin-bottom: 4px; }
    .sub { color: #8b949e; font-size: 14px; margin-bottom: 24px; }

    .add-row { display: flex; gap: 8px; margin-bottom: 26px; }
    input[type="text"] {
      flex: 1; padding: 11px 13px; border-radius: 10px; border: 1px solid #30363d;
      background: #161b22; color: #e6edf3; font-size: 15px; outline: none;
    }
    input::placeholder { color: #6e7681; }
    button {
      border: none; border-radius: 10px; padding: 11px 16px; cursor: pointer;
      background: #238636; color: #fff; font-size: 14px; font-weight: 600;
    }
    button:hover { background: #2ea043; }

    .habit {
      background: #161b22; border: 1px solid #30363d; border-radius: 14px;
      padding: 18px; margin-bottom: 16px;
    }
    .habit-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .habit-name { font-size: 17px; font-weight: 600; flex: 1; cursor: text; }
    .habit-name input { font-size: 17px; font-weight: 600; padding: 4px 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; outline: none; width: 100%; }
    .streak { font-size: 13px; color: #f0a500; background: rgba(240,165,0,0.12); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .check-btn { padding: 8px 14px; font-size: 13px; }
    .check-btn.done { background: #1f6feb; }
    .check-btn.done:hover { background: #388bfd; }
    .trash { background: transparent; color: #6e7681; padding: 6px 8px; font-size: 16px; }
    .trash:hover { color: #f85149; background: transparent; }
    .move { background: transparent; color: #6e7681; padding: 6px 4px; font-size: 13px; }
    .move:hover { color: #e6edf3; background: transparent; }
    .move:disabled { opacity: 0.25; cursor: not-allowed; }

    /* 热力图 */
    .heatmap { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 3px; overflow-x: auto; padding-bottom: 4px; }
    .cell { width: 13px; height: 13px; border-radius: 3px; background: #21262d; }
    .cell.lvl1 { background: #0e4429; }
    .cell.lvl2 { background: #006d32; }
    .cell.lvl3 { background: #26a641; }
    .cell.today { outline: 1px solid #58a6ff; }
    .legend { display: flex; align-items: center; gap: 6px; justify-content: flex-end; font-size: 11px; color: #8b949e; margin-top: 8px; }
    .note-row { display: flex; gap: 8px; margin-top: 12px; font-size: 13px; }
    .note-row input { flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 13px; outline: none; }
    .note-row input::placeholder { color: #6e7681; }

    .empty { text-align: center; color: #6e7681; padding: 40px 0; font-size: 15px; }
    .stats { color: #8b949e; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌱 习惯追踪器</h1>
    <p class="sub">每天打卡，养成好习惯。绿格子越多越有成就感～</p>

    <div class="add-row">
      <input type="text" id="habitInput" placeholder="新习惯，比如：读书 30 分钟 / 喝 8 杯水">
      <button onclick="addHabit()">＋ 添加</button>
    </div>

    <div id="habitList"></div>

    <div style="text-align:center; margin-top: 24px; font-size: 13px;">
      <a href="#" onclick="exportData(event)" style="color:#58a6ff; margin-right: 12px;">⬇ 导出数据</a>
      <a href="#" onclick="document.getElementById('importFile').click()" style="color:#58a6ff;">⬆ 导入数据</a>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <!-- 纯逻辑（日期/连续天数/统计/规范化）独立成文件以便单元测试；双击打开仍正常，无需服务器 -->
  <script src="habit-logic.js"></script>
  <script>
    /* 数据结构：
       habits = [{ id, name, dates: { "2026-06-04": true, ... } }]
       dates 里只记录"打过卡的那天"。 */
    let habits = normalizeHabits(safeParse(localStorage.getItem('habits'), []));
    function save() { localStorage.setItem('habits', JSON.stringify(habits)); }

    // 安全解析 JSON：localStorage 万一被改坏了也不会让整个页面崩溃
    function safeParse(raw, fallback) {
      try { return raw ? JSON.parse(raw) : fallback; } catch { return fallback; }
    }
    // dayKey / normalizeHabits / currentStreak / bestStreak / totalDone / doneInLastDays
    // 这些纯逻辑都定义在 habit-logic.js 里（已被单元测试覆盖）。

    const todayKey = dayKey(new Date());

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      if (!name) return;
      habits.push({ id: Date.now() + '-' + Math.floor(Math.random()*1000), name, dates: {} });
      input.value = '';
      save(); render();
    }
    document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

    // 连续打卡到关键天数时弹一句鼓励（只在「新打上」时触发，取消打卡不弹）
    const MILESTONES = {
      3:   { emoji: '🌱', text: '3 天了，习惯的种子发芽啦' },
      7:   { emoji: '🔥', text: '连续 7 天！一周的坚持很了不起' },
      14:  { emoji: '🎯', text: '两周打卡，状态稳定下来了' },
      21:  { emoji: '💪', text: '21 天 —— 据说习惯雏形已经成型' },
      30:  { emoji: '🏆', text: '30 天！这是真·习惯了' },
      50:  { emoji: '🚀', text: '50 天，你已经超过大多数人' },
      100: { emoji: '🌟', text: '100 天！太厉害了，给自己点个奖励吧' },
    };
    function toggleToday(id) {
      const h = habits.find(x => x.id === id);
      const wasDone = !!h.dates[todayKey];
      if (wasDone) delete h.dates[todayKey];
      else h.dates[todayKey] = true;
      save(); render();
      // 刚打上卡 → 看看连续天数有没有命中里程碑
      if (!wasDone) {
        const s = currentStreak(h);
        const m = MILESTONES[s];
        if (m) setTimeout(() => alert(`${m.emoji} ${m.text}\n\n习惯：${h.name}`), 80);
      }
    }

    function removeHabit(id) {
      if (!confirm('确定删除这个习惯吗？打卡记录也会一起删掉。')) return;
      habits = habits.filter(x => x.id !== id);
      save(); render();
    }

    // 上移 / 下移：dir 为 -1 上移、+1 下移
    function moveHabit(id, dir) {
      const i = habits.findIndex(x => x.id === id);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= habits.length) return;
      [habits[i], habits[j]] = [habits[j], habits[i]];
      save(); render();
    }

    // 给今天的打卡加备注（如"读了三章 + 喜欢"）。空字符串则删除该天的备注。
    function setNote(id, text) {
      const h = habits.find(x => x.id === id); if (!h) return;
      h.notes = h.notes || {};
      const t = (text || '').trim();
      if (t) h.notes[todayKey] = t;
      else delete h.notes[todayKey];
      save();
      // 不调用 render() 避免输入框失去焦点；下次刷新时就能看到
    }

    // 双击习惯名称进入编辑：回车/失焦保存，Esc 取消
    function renameHabit(id, span) {
      const h = habits.find(x => x.id === id); if (!h) return;
      const input = document.createElement('input');
      input.type = 'text'; input.value = h.name;
      span.replaceWith(input); input.focus(); input.select();
      const commit = () => {
        const v = input.value.trim();
        if (v && v !== h.name) { h.name = v; save(); }
        render();
      };
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') commit();
        else if (e.key === 'Escape') render();
      });
      input.addEventListener('blur', commit);
    }

    // currentStreak / bestStreak / totalDone / doneInLastDays 见 habit-logic.js。

    // 生成最近 ~17 周（119 天）的热力图格子
    function heatmapHtml(h) {
      const DAYS = 119; // 17 周 × 7 天
      const cells = [];
      const today = new Date();
      // 让网格从"周日"对齐：找到 DAYS 天前那天，再回退到它所在周的周日
      let start = new Date(today);
      start.setDate(start.getDate() - (DAYS - 1));
      start.setDate(start.getDate() - start.getDay()); // 回退到周日
      for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
        const k = dayKey(d);
        const done = h.dates[k];
        const isToday = k === todayKey;
        const note = h.notes && h.notes[k];
        const tip = `${k}${done ? ' ✓ 已打卡' : ''}${note ? '\n备注：' + note : ''}`;
        cells.push(`<div class="cell ${done ? 'lvl3' : ''} ${isToday ? 'today' : ''}" title="${escapeHtml(tip)}"></div>`);
      }
      return `<div class="heatmap">${cells.join('')}</div>`;
    }

    function render() {
      const box = document.getElementById('habitList');
      if (habits.length === 0) {
        box.innerHTML = '<div class="empty">还没有习惯，上面加一个开始吧 👆</div>';
        return;
      }
      box.innerHTML = habits.map((h, idx) => {
        const doneToday = !!h.dates[todayKey];
        const streak = currentStreak(h);
        return `
        <div class="habit">
          <div class="habit-head">
            <span class="habit-name" ondblclick="renameHabit('${h.id}', this)" title="双击重命名">${escapeHtml(h.name)}</span>
            <span class="streak">🔥 连续 ${streak} 天</span>
            <button class="check-btn ${doneToday ? 'done' : ''}" onclick="toggleToday('${h.id}')">
              ${doneToday ? '✓ 今天已打卡' : '今天打卡'}
            </button>
            <button class="move" onclick="moveHabit('${h.id}', -1)" title="上移" aria-label="上移习惯" ${idx === 0 ? 'disabled' : ''}>↑</button>
            <button class="move" onclick="moveHabit('${h.id}', 1)" title="下移" aria-label="下移习惯" ${idx === habits.length - 1 ? 'disabled' : ''}>↓</button>
            <button class="trash" onclick="removeHabit('${h.id}')" title="删除" aria-label="删除习惯">🗑</button>
          </div>
          ${heatmapHtml(h)}
          <div class="legend">少 <span class="cell"></span><span class="cell lvl1"></span><span class="cell lvl2"></span><span class="cell lvl3"></span> 多</div>
          ${doneToday ? `
          <div class="note-row">
            <input type="text" placeholder="今天的备注（可选）" value="${escapeHtml((h.notes && h.notes[todayKey]) || '')}"
              onchange="setNote('${h.id}', this.value)">
          </div>` : ''}
          <div class="stats">累计 ${totalDone(h)} 天 · 历史最长 ${bestStreak(h)} 天 · 本周 ${doneInLastDays(h, 7)}/7 · 本月 ${doneInLastDays(h, 30)}/30</div>
        </div>`;
      }).join('');
    }

    // 导出：下载一份 JSON 备份（备份到电脑文件夹，换浏览器/换机器可恢复）
    function exportData(e) {
      e.preventDefault();
      const blob = new Blob([JSON.stringify(habits, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `habits-${todayKey}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    // 导入：读 JSON 文件，覆盖当前数据（导入前会让你确认一下）
    function importData(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error('文件格式不对（应为习惯数组）');
          const cleaned = normalizeHabits(data);   // 规范化，丢弃不合法的项
          if (!cleaned.length) throw new Error('文件里没有有效的习惯数据');
          if (!confirm(`将导入 ${cleaned.length} 个习惯，会覆盖当前数据，继续？`)) return;
          habits = cleaned; save(); render();
          alert('导入成功 ✅');
        } catch (err) {
          alert('导入失败：' + err.message);
        } finally {
          e.target.value = ''; // 允许下次再导同名文件
        }
      };
      reader.readAsText(file);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    render();
  </script>
</body>
</html>
